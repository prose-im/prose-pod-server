# See <https://taskfile.dev/usage> and <https://taskfile.dev/reference/schema>
# to find all keys and their usage.
version: "3"

tasks:
  doc:open:
    desc: Build and open Cargo docs.
    aliases: [doc]
    cmd: cargo doc --no-deps -F destination_all --lib --open

  example:*:
    desc: Run an example.
    cmd: cargo run -F example --example {{ index .MATCH 0 }}{{ if .CLI_ARGS }} -- {{ .CLI_ARGS }}{{ end }}
    dotenv: [test.env]

  test:
    desc: Run all tests.
    cmds:
      - rm -rf "$(cargo metadata --format-version 1 --no-deps | jq -r '.target_directory')"/tmp/test-*
      - cargo test --no-default-features -F test -F destination_all {{ .CLI_ARGS }}
    dotenv: [test.env]

  ci:
    desc: Run CI tests (doesn’t test S3).
    cmds:
      - cargo fmt --check
      - cargo clippy
      - cargo test --no-default-features -F test -F destination_all -- --skip s3
      - cargo test --doc -p composable-stream -F doc
      - cargo check --release --lib
    dotenv: [test.env]

  dev:doc:
    desc: Rebuild Cargo docs on source file changes.
    aliases: [doc:watch]
    preconditions:
      - sh: command -v cargo-watch >/dev/null 2>&1
        msg: "Install `cargo-watch` using `cargo install cargo-watch`."
    cmds:
      - task: doc:open
      - cmd: cargo watch -x 'doc --no-deps -F destination_all --lib'
